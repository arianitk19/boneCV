<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>boneCV Pro — Jashtë linje</title>
<meta name="theme-color" content="#020202">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root { --bg:#020202; --accent:#3b82f6; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:#fff;
    font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  body { min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px;
    overflow:hidden; position:relative; text-align:center; }
  .glow { position:fixed; width:520px; height:520px; border-radius:50%; filter:blur(90px);
    background:radial-gradient(circle,#2563eb 0%,transparent 70%); opacity:.35; top:-15%; left:-10%; z-index:0; }
  .glow.two { background:radial-gradient(circle,#7c3aed 0%,transparent 70%); top:auto; left:auto;
    bottom:-20%; right:-12%; opacity:.28; }
  .card { position:relative; z-index:1; max-width:440px; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:999px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); font-size:12px; font-weight:600;
    letter-spacing:.05em; color:rgba(255,255,255,.7); margin-bottom:28px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#f59e0b; box-shadow:0 0 0 0 rgba(245,158,11,.5);
    animation:pulse 2s infinite; }
  @keyframes pulse { 70%{box-shadow:0 0 0 10px rgba(245,158,11,0);} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0);} }
  .ic { width:96px; height:96px; margin:0 auto 24px; border-radius:28px;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8); display:flex; align-items:center; justify-content:center;
    box-shadow:0 24px 60px rgba(59,130,246,.4), inset 0 1px 0 rgba(255,255,255,.15); }
  .ic svg { width:48px; height:48px; }
  h1 { font-size:clamp(1.7rem,6vw,2.4rem); font-weight:800; letter-spacing:-.02em; margin:0 0 12px; }
  p { color:rgba(255,255,255,.6); line-height:1.6; margin:0 0 28px; font-size:15px; }
  .btn { display:inline-flex; align-items:center; gap:10px; padding:15px 26px; border-radius:16px; border:none;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; font-weight:700; font-size:15px; cursor:pointer;
    box-shadow:0 18px 45px rgba(59,130,246,.4); transition:transform .15s, box-shadow .3s;
    font-family:inherit; text-decoration:none; }
  .btn:active { transform:scale(.97); }
  .hint { margin-top:22px; font-size:13px; color:rgba(255,255,255,.35); }
  .hint b { color:rgba(255,255,255,.6); font-weight:600; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow two"></div>
  <div class="card">
    <div class="badge"><span class="dot"></span> Jashtë linje</div>
    <div class="ic" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </div>
    <h1>Nuk ka lidhje me internetin</h1>
    <p>Por mos u shqetëso — boneCV punon edhe pa internet. Dokumentet e tua janë të ruajtura në pajisje. Provo përsëri kur të rikthehet lidhja.</p>
    <button class="btn" onclick="location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Provo përsëri
    </button>
    <div class="hint">Faqet e vizituara më parë hapen normalisht <b>offline</b>.</div>
  </div>
  <script>
    // Auto-reload the moment connectivity returns.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
