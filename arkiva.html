<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>boneCV Pro — Arkiva Reale</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020202">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://img.icons8.com/?size=180&id=BB6Nq8E661J1&format=png&color=FFFFFF">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
:root { --bg:#020202; --card:rgba(10,10,10,0.7); --border:rgba(255,255,255,0.06); }
* { -webkit-tap-highlight-color: transparent; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:#fff; min-height:100vh; overflow-x:hidden;
    background-image: radial-gradient(at 80% 0%, rgba(37,99,235,0.08) 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(124,58,237,0.05) 0px, transparent 50%);
}

#sidebar { position:fixed; top:0; left:0; height:100%; width:280px; z-index:5000; transform:translateX(-100%); transition:transform .5s cubic-bezier(.16,1,.3,1); }
#sidebar.open { transform:translateX(0); }
.sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .35s; z-index:4999; }
.sidebar-overlay.show { opacity:1; pointer-events:auto; }
@media (min-width:1024px) { #sidebar{transform:translateX(0);} #app{padding-left:280px;} #menuBtn,.sidebar-overlay{display:none!important;} }
.nav-link{color:rgba(255,255,255,0.6);} .nav-link:hover{background:rgba(255,255,255,0.04);color:#fff;}
.nav-link.is-active{background:linear-gradient(135deg,rgba(37,99,235,0.18),rgba(37,99,235,0.06));color:#fff;box-shadow:inset 0 0 0 1px rgba(59,130,246,0.25);}
.nav-link.is-active i{color:#60a5fa;}

.glass { background:var(--card); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border:1px solid var(--border); border-radius:24px; }
.glass-soft { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:20px; }
.input { width:100%; background:rgba(255,255,255,0.03); border:1px solid transparent; border-radius:14px; padding:12px 16px; color:#fff; font-size:14px; transition:.2s; }
.input:focus { outline:none; border-color:rgba(59,130,246,0.5); background:rgba(255,255,255,0.05); }

.filter-btn { padding:8px 14px; border-radius:999px; background:rgba(255,255,255,0.03); border:1px solid var(--border); font-size:12px; font-weight:600; cursor:pointer; transition:.2s; color:rgba(255,255,255,0.65); }
.filter-btn.active { background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(59,130,246,0.05)); border-color:rgba(59,130,246,0.45); color:#fff; }
.filter-btn:hover { color:#fff; }

.btn { transition:transform .15s, background .25s; cursor:pointer; }
.btn:active { transform:scale(0.97); }

.card {
    transition: transform .3s cubic-bezier(.16,1,.3,1), border-color .3s, background .3s;
    cursor: pointer;
}
.card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.14); }

.icon-blob { width:42px; height:42px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ic-cv { background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.25); color:#93c5fd; }
.ic-k { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.25); color:#86efac; }
.ic-q { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.25); color:#fcd34d; }

.action-btn { width:34px; height:34px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid var(--border); display:inline-flex; align-items:center; justify-content:center; color:#fff; transition:.2s; cursor:pointer; }
.action-btn:hover { background:rgba(255,255,255,0.08); }
.action-btn.danger:hover { background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.35); color:#fca5a5; }
</style>
</head>
<body>
<button id="menuBtn" class="lg:hidden fixed top-5 left-5 z-[6000] w-12 h-12 rounded-2xl flex items-center justify-center btn" style="background:rgba(10,10,10,0.7);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.06);">
    <i class="fa-solid fa-bars text-lg"></i>
</button>

<div id="sidebar"></div>
<div class="sidebar-overlay" id="sbOverlay"></div>

<main id="app" class="min-h-screen">
    <div class="max-w-6xl mx-auto px-5 md:px-10 pt-20 lg:pt-12 pb-24">
        <header class="mb-8">
            <div class="text-xs uppercase tracking-[0.3em] text-white/40 mb-3">
                <i class="fa-solid fa-box-archive mr-1"></i> Arkiva Reale
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight">Dokumentet e mia</h1>
            <p class="text-white/55 mt-3 max-w-xl">Të gjitha CV-të, kontratat dhe kërkesat e ruajtura në pajisjen tënde, gati për t'u rikarkuar, printuar ose fshirë.</p>
        </header>

        <!-- Controls -->
        <div class="glass p-4 md:p-5 mb-6 flex flex-col md:flex-row gap-3 md:items-center">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/30"></i>
                <input class="input pl-11" id="search" placeholder="Kërko sipas titullit…">
            </div>
            <div class="flex gap-2 flex-wrap">
                <button class="filter-btn active" data-filter="all">Të gjitha</button>
                <button class="filter-btn" data-filter="CV">CV</button>
                <button class="filter-btn" data-filter="Kontratë">Kontrata</button>
                <button class="filter-btn" data-filter="Kërkesë">Kërkesa</button>
            </div>
        </div>

        <!-- Grid -->
        <section id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></section>

        <!-- Danger zone -->
        <section class="mt-16 glass-soft p-6 border border-red-500/15">
            <div class="flex items-start justify-between gap-4 flex-wrap">
                <div>
                    <div class="text-xs uppercase tracking-widest text-red-400 mb-2">Zonë me rrezik</div>
                    <div class="font-bold text-lg">Fshi të gjithë arkivën</div>
                    <p class="text-sm text-white/55 mt-1">Ky veprim është i pakthyeshëm dhe do të fshijë çdo dokument të ruajtur lokalisht.</p>
                </div>
                <button id="clearAllBtn" class="btn px-5 py-3 rounded-xl font-semibold text-sm" style="background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 10px 30px rgba(239,68,68,0.35);">
                    <i class="fa-solid fa-trash-can mr-2"></i> Fshi gjithçka
                </button>
            </div>
        </section>
    </div>
</main>

<script src="master.js"></script>
<script>
bonecv.mountSidebar('sidebar','arkiva');
const sb = document.getElementById('sidebar'); const ov = document.getElementById('sbOverlay');
document.getElementById('menuBtn').onclick = () => { sb.classList.add('open'); ov.classList.add('show'); };
ov.onclick = () => { sb.classList.remove('open'); ov.classList.remove('show'); };

let filter = 'all';
let q = '';

const esc = bonecv.escapeHTML;

function iconClass(type) { return type === 'CV' ? 'ic-cv fa-id-badge' : type === 'Kontratë' ? 'ic-k fa-file-signature' : 'ic-q fa-envelope-open-text'; }
function editorFor(type) { return type === 'CV' ? 'cv.html' : type === 'Kontratë' ? 'kontrata.html' : 'kerkesa.html'; }

function render() {
    const list = bonecv.getArchive().filter(x => {
        if (filter !== 'all' && x.type !== filter) return false;
        if (q && !x.title.toLowerCase().includes(q.toLowerCase())) return false;
        return true;
    });
    const grid = document.getElementById('grid');
    if (!list.length) {
        grid.innerHTML = `
            <div class="glass-soft p-10 text-center md:col-span-2 lg:col-span-3">
                <div class="w-16 h-16 rounded-2xl bg-white/[0.03] border border-white/[0.06] flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-folder-open text-white/35 text-xl"></i>
                </div>
                <div class="font-semibold text-lg">Asnjë dokument</div>
                <div class="text-sm text-white/50 mt-1">Filloni duke krijuar një CV, kontratë ose kërkesë.</div>
                <div class="flex gap-2 justify-center mt-5 flex-wrap">
                    <a href="cv.html" class="filter-btn">CV i ri</a>
                    <a href="kontrata.html" class="filter-btn">Kontratë</a>
                    <a href="kerkesa.html" class="filter-btn">Kërkesë</a>
                </div>
            </div>`;
        return;
    }
    grid.innerHTML = list.map(item => {
        const ic = iconClass(item.type).split(' ');
        return `
        <div class="glass-soft card p-5 flex flex-col gap-4" data-id="${item.id}">
            <div class="flex items-start gap-3">
                <div class="icon-blob ${ic[0]}"><i class="fa-solid ${ic[1]}"></i></div>
                <div class="min-w-0 flex-1">
                    <div class="font-semibold truncate">${esc(item.title)}</div>
                    <div class="text-xs text-white/45 mt-0.5">${esc(item.type)} • ${esc(bonecv.formatDateSq(item.date))}</div>
                </div>
            </div>
            <div class="flex items-center gap-2 mt-auto">
                <button class="action-btn" data-act="edit" title="Rikarko në editor"><i class="fa-solid fa-pen"></i></button>
                <button class="action-btn" data-act="print" title="Printo / Shkarko"><i class="fa-solid fa-print"></i></button>
                <button class="action-btn" data-act="duplicate" title="Dyfisho"><i class="fa-solid fa-clone"></i></button>
                <button class="action-btn danger ml-auto" data-act="delete" title="Fshi"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(c => {
        const id = c.dataset.id;
        c.querySelectorAll('[data-act]').forEach(btn => {
            btn.onclick = (e) => { e.stopPropagation(); handleAction(btn.dataset.act, id); };
        });
        c.addEventListener('click', () => handleAction('edit', id));
    });
}

async function handleAction(act, id) {
    const list = bonecv.getArchive();
    const item = list.find(x => String(x.id) === String(id));
    if (!item) return;

    if (act === 'edit' || act === 'print') {
        bonecv.setEditPayload(item);
        location.href = editorFor(item.type) + (act === 'print' ? '?autoprint=1' : '');
    } else if (act === 'duplicate') {
        const copy = bonecv.saveToArchive(item.type, item.title + ' (kopje)', item.content);
        bonecv.toast('U dyfishua dokumenti', 'success');
        render();
    } else if (act === 'delete') {
        const ok = await bonecv.confirmDialog({
            title: 'Fshi këtë dokument?',
            message: `"${item.title}" do të fshihet përgjithmonë.`,
            confirmText: 'Po, fshi',
            cancelText: 'Anulo',
            danger: true
        });
        if (ok) { bonecv.deleteArchiveEntry(id); bonecv.toast('U fshi dokumenti', 'success'); render(); }
    }
}

document.getElementById('search').addEventListener('input', e => { q = e.target.value; render(); });
document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
    b.onclick = () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        filter = b.dataset.filter;
        render();
    };
});

document.getElementById('clearAllBtn').onclick = async () => {
    const ok = await bonecv.confirmDialog({
        title: 'Fshi të gjithë arkivën?',
        message: 'Të gjitha dokumentet e ruajtura do të fshihen përgjithmonë. Ky veprim është i pakthyeshëm.',
        confirmText: 'Po, fshi gjithçka',
        cancelText: 'Anulo',
        danger: true
    });
    if (ok) { bonecv.clearArchive(); bonecv.toast('Arkiva u zbraz', 'info'); render(); }
};

document.addEventListener('bonecv:archive', render);
render();
</script>
</body>
</html>
